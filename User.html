   <style>
body {
    margin: 0;
    padding: 0;
    background-color: #bed4cb;
    font-family: Verdana;
}

/* PAGE TITLE */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #1b2a2c;
}

/* MAIN CONTAINER */
.container {
    margin: 50px auto;
    padding: 35px;
    width: 600px;
    
    background-color: #87B6BC;
    display: flex;
    gap: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

/* FORM SECTION */
.user {
    /* display: flex; */
    margin-left: 20px;
    flex-direction: column;
    gap: 20x;
    align-items: start;
}

/* EACH ROW */
.field {
    display: grid;
    grid-template-columns: 160px 300px; /* reduced input width */
    align-items: center;
    column-gap: 20px;
    padding: 8px;
    border-radius: 6px;
    background-color: #7faeb4;
}

/* LABEL */
.field label {
    text-align: left;
    font-weight: bold;
    color: #1f2d2f;
    padding: 8px;
    background-color: #6f9ca2;
    border-radius: 4px;
}

/* INPUTS */
.field input,
.field select,
.field textarea {
    padding: 8px;
    border: 2px solid #5f7f83;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background-color: #f0f7f6;
    width: 100%;
}

/* FOCUS EFFECT */
.field input:focus,
.field select:focus,
.field textarea:focus {
    border-color: #2f5f66;
    box-shadow: 0 0 5px rgba(47, 95, 102, 0.5);
}

/* BUTTON CONTAINER */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    width: 100%;
}

/* BUTTONS */
button {
    background-color: #4f6f73;
    padding: 17px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: #000000;
    transition: 0.3s;
    font-size: 13px;
}

button:hover {
    background-color: #2f5f66;
}
</style>

</head>

    <div class="main">
            <h2>User Details Manager</h2>

    <div class="container">
        
        
       
        <div class="user">
            <div class="field">
    <label>User ID:</label> 
    <select id="ddlUserID"></select>
</div>

<div class="field">
    <label>User Name:</label>
    <input type="text" id="txtName" required>
</div>

<div class="field">
    <label>User Type:</label>
    <select id="ddlCategory" required></select>
</div>

<div class="field">
    <label>User Email:</label>
    <input type="text" id="txtEmail" required>
</div>

<div class="field">
    <label>Password:</label>
    <input type="text" id="txtPass" required>
</div>

   <div class="buttons" style="margin: 20px; display: flexbox;">
        <button type="button" onclick="addUser()" >Add New User</button>
    <button type="button" onclick="Save()" > Save Details</button><br>
    <button type="button" onclick="Edit()" >Edit Details</button>
    <button  type="button" onclick="updateUser()" >Update Details</button><br>

    <script>
        // const prodApi="http://localhost:55801/api/Product";
        // const cartApi="http://localhost:55801/api/Cart";
        // const userApi="http://localhost:55801/api/USer";
        const catApi="http://localhost:55801/api/Category";
        const typeApi="http://localhost:55801/api/Type";


        $(document).ready(function(){
            loadCategory();
            loadUserID();
            
        })
        let categoryList = [];
        function loadCategory() {
    $.ajax({
        url: typeApi,
        type: "GET",
        success: (users) => {
            categoryList = users; // ✅ store full list

            let option = "";

            users.forEach(c => {
               option += `<option value="${c.TypeID}">${c.TypeName}</option>`;
            });

            $("#ddlCategory").html(option);
        },
        error: () => {
            alert("Error loading Types");
        }
    });
}

function getCategoryName(catId) {
    let cat = categoryList.find(c => c.id == catId);
    return cat ? cat.name : "Unknown";
}
      
function loadUserID(){
            $.ajax({
                url:userApi,
                type:"GET",
                success:(users)=>{
                    let option="";
                    users.forEach(element => {
                        option+=`<option value="${element.UserID}">${element.UserID}</option>`;
                    });
                    $("#ddlUserID").html(option);
                    if(users.length>0){
                       
                        fillData(users[0]);
                        disableForm();
                    }
                },
                error:(err)=>{
                    alert(err);
                }
            });
        }
        
    function fillData(user){
      
        $("#txtName").val(user.Name);
        $("#ddlCategory").val(String(user.TypeID));

        $("#txtEmail").val(user.Email);
        $("#txtPass").val(user.Password);


    }

     $("#ddlUserID").change(() => {
        let id = $("#ddlUserID").val();
        $.ajax({
            url: userApi,
            type: "GET",
            success: (users) => {
                let user = users.find(e => e.UserID == id);
                if(user){
                    fillData(user);
                    disableForm();
                }
            },
            error: () => {
                alert("Error fetching Users");
            }
        });
    });
    
   function getData(){
   
    let pass=$("#txtPass").val();
    let category= parseInt($("#ddlCategory").val());
    let email=$("#txtEmail").val();
    let uName=$("#txtName").val();
    if(uName==""){
          alert("Enter User Name");
        return;
    }else if(isNaN(category) ||category<0){
        alert("Select Type of User");
        return;
    }else if (email=="") {
        alert("Enter Email");
        return;
    }else if(pass==""){
        alert("Insert Password");
        return;
    }else 

    return {
        UserID: parseInt($("#ddlUserID").val()),
        Name:uName,
        TypeID:category,
        Email: email,
        Password: pass,
    };
}

function clearForm(){
        $("#ddlUserID").val("");
        $("#txtName").val("");
        $("#ddlCategory").val("");       
        $("#txtEmail").val("");
        $("#txtPass").val("");
        
        
    }
    function addUser(){
        $("#ddlUserID").prop("disabled", true);
         clearForm();
        enableForm();
    }
    //  Disable Form

    function disableForm(){
         $("#txtName").prop("disabled", true);
         $("#txtEmail").prop("disabled", true);
         $("#ddlCategory").prop("disabled", true);
         $("#txtPass").prop("disabled", true);
     }

 

//  Enable Form

    function enableForm(){
         $("#txtName").prop("disabled", false);
         $("#txtEmail").prop("disabled", false);
         $("#ddlCategory").prop("disabled", false);
       
         $("#txtPass").prop("disabled", false);

        }
    function Save(){
        let user=getData();
    if(!user) return;
        $.ajax({
            url:userApi,
            type:"POST",
            contentType:"application/json",
            data:JSON.stringify(user),
            success:()=>{
                alert("User Added!!");
                clearForm();
                loadUserID();
            },
            error:()=>{
                alert("Error Saving User");
            }
        });
                $("#ddlUserID").prop("disabled", false);

    }
    
    function Edit(){
        enableForm();
    }

    function updateUser(){
        let user=getData();
          if(!user) return;
        $.ajax({
            url:userApi,
            type:"PUT",
            contentType:"application/json",
            data:JSON.stringify(user),
            success:()=>{
                alert("User Details Updated!!");
                disableForm();
                loadUserID();
            }
        })
    }
    function deleteUser(){
        let id = $("#ddlUserID").val();
        if(!confirm("Are you sure to delete?")) return;
        $.ajax({
            url: `${userApi}?id=${id}`,
            type: "DELETE",
            success: () => {
                alert("User Deleted");
                clearForm();
                loadUserID();
            },
            error: () => {
                alert("Error deleting employee");
            }
        });
    }
    </script>
