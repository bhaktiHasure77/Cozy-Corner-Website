   <style>
body {
    margin: 0;
    padding: 0;
    background-color: #bed4cb;
    font-family: Verdana;
}

/* PAGE TITLE */
h2 {
    text-align: center;
    margin-top: 20px;
    color: #1b2a2c;
}

/* MAIN CONTAINER */
.container {
    margin: 50px auto;
    padding: 35px;
    width: 1100px;
    
    background-color: #87B6BC;
    display: flex;
    gap: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
}

/* IMAGE SECTION */
.image img {
    height: 570px;
    width: 450px;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid #698f94;
}

/* FORM SECTION */
.product {
   
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20x;
    align-items: start;
}

/* EACH ROW */
.field {
    display: grid;
    grid-template-columns: 160px 300px; /* reduced input width */
    align-items: center;
    column-gap: 20px;
    padding: 8px;
    border-radius: 6px;
    background-color: #7faeb4;
}

/* LABEL */
.field label {
    text-align: left;
    font-weight: bold;
    color: #1f2d2f;
    padding: 8px;
    background-color: #6f9ca2;
    border-radius: 4px;
}

/* INPUTS */
.field input,
.field select,
.field textarea {
    padding: 8px;
    border: 2px solid #5f7f83;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background-color: #f0f7f6;
    width: 100%;
}

/* FOCUS EFFECT */
.field input:focus,
.field select:focus,
.field textarea:focus {
    border-color: #2f5f66;
    box-shadow: 0 0 5px rgba(47, 95, 102, 0.5);
}

/* BUTTON CONTAINER */
.buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    width: 100%;
}

/* BUTTONS */
button {
    background-color: #4f6f73;
    padding: 17px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    color: #000000;
    transition: 0.3s;
    font-size: 13px;
}

button:hover {
    background-color: #2f5f66;
}
</style>

        <div class="product">
            <div class="field">
    <label>Product ID:</label> 
    <select id="ddlprodID"></select>
</div>

<div class="field">
    <label>Product Name:</label>
    <input type="text" id="txtName" required>
</div>

<div class="field">
    <label>Category:</label>
    <select id="ddlCategory" required></select>
</div>

<div class="field">
    <label>Product Image:</label>
    <input type="text" id="txtImage" required>
</div>

<div class="field">
    <label>Quantity:</label>
    <input type="text" id="txtQuantity" required>
</div>

<div class="field">
    <label>Price:</label>
    <input type="text" id="txtPrice" required>
</div>

<div class="field">
    <label>Description:</label>
    <textarea id="prodDescription" rows="2" required></textarea>
</div>

   <div class="buttons" style="margin: 20px; display: flexbox;">
        <button type="button" onclick="addProduct()" >Add Product</button>

    <script>
        // const prodApi="http://localhost:55801/api/Product";
        // const cartApi="http://localhost:55801/api/Cart";
        const catApi="http://localhost:55801/api/Category";


        $(document).ready(function(){
            loadCategory();
            loadProductID();
            
        })
        let categoryList = [];
        function loadCategory() {
    $.ajax({
        url: catApi,
        type: "GET",
        success: (cats) => {
            categoryList = cats; // store full list

            let option = "";

            cats.forEach(c => {
               option += `<option value="${c.CID}">${c.CName}</option>`;
            });

            $("#ddlCategory").html(option);
        },
        error: () => {
            alert("Error loading categories");
        }
    });
}

function getCategoryName(catId) {
    let cat = categoryList.find(c => c.id == catId);
    return cat ? cat.name : "Unknown";
}
        function loadProductID(){
            $.ajax({
                url:prodApi,
                type:"GET",
                success:(prod)=>{
                    let option="";
                    prod.forEach(element => {
                        option+=`<option value="${element.ProdID}">${element.ProdID}</option>`;
                    });
                    $("#ddlprodID").html(option);
                    if(prod.length>0){
                       
                        fillData(prod[0]);
                        disableForm();
                    }
                },
                error:(err)=>{
                    alert(err);
                }
            });
        }
        
    function fillData(prod){
      
        $("#txtName").val(prod.ProdName);
        $("#ddlCategory").val(String(prod.CategoryID));
        $("#txtImage").val(prod.Image);
        $("#imgProduct").attr("src", prod.Image);
        $("#txtQuantity").val(prod.QNTY);
        $("#txtPrice").val(prod.Price);
        $("#prodDescription").val(prod.Description);


    }

     $("#ddlprodID").change(() => {
        let id = $("#ddlprodID").val();
        $.ajax({
            url: prodApi,
            type: "GET",
            success: (prod) => {
                let product = prod.find(e => e.ProdID == id);
                if(product){
                    fillData(product);
                    disableForm();
                }
            },
            error: () => {
                alert("Error fetching employee");
            }
        });
    });
    
   function getData(){
    let qty = parseInt($("#txtQuantity").val());
    let price=parseFloat($("#txtPrice").val());
    let category= parseInt($("#ddlCategory").val());
    let img=$("#txtImage").val();
    let dsc=$("#prodDescription").val();

    let Name=$("#txtName").val();
    if(Name==""){
          alert("Enter Product Name");
        return;
    }else if(isNaN(category) ||category<0){
        alert("Select Category of Product");
        return;
    }else if(img==""){
         alert("Insert Image Path");
        return;
    }else if (isNaN(qty) || qty < 0) {
        alert("Quantity must be  greater than 0");
        return;
    }else if (isNaN(price) || price <= 0) {
        alert("Price must be greater than 0");
        return;
    }else  if(dsc==""){
        alert("Insert Description of Product");
        return;
    }else 

    return {
        ProdID: parseInt($("#ddlprodID").val()),
        ProdName:Name ,
        CategoryID:category,
        Image: img,
        QNTY: qty,
        Price: price,
        Description: dsc,
    };
}

function clearForm(){
        $("#ddlprodID").val("");
        $("#txtName").val("");
        $("#ddlCategory").val("");
        $("#txtImage").val("");
        $("#txtQuantity").val("");
        $("#txtPrice").val("");
        $("#prodDescription").val("");
        
    }
    function addProduct(){
         clearForm();
        enableForm();
    }
    //  Disable Form

    function disableForm(){
         $("#txtName").prop("disabled", true);
         $("#txtQuantity").prop("disabled", true);
         $("#ddlCategory").prop("disabled", true);
          $("#txtImage").prop("disabled", true);
         $("#txtQuantity").prop("disabled", true);
         $("#txtPrice").prop("disabled", true);
         $("#prodDescription").prop("disabled", true);
     }

 

//  Enable Form

    function enableForm(){
         $("#txtName").prop("disabled", false);
         $("#txtQuantity").prop("disabled", false);
         $("#ddlCategory").prop("disabled", false);
         $("#txtImage").prop("disabled", false);
         $("#txtQuantity").prop("disabled", false);
         $("#txtPrice").prop("disabled", false);
         $("#prodDescription").prop("disabled", false);

        }
    function Save(){
        let prod=getData();
    if(!prod) return;
        $.ajax({
            url:prodApi,
            type:"POST",
            contentType:"application/json",
            data:JSON.stringify(prod),
            success:()=>{
                alert("Product Added!!");
                clearForm();
                loadProductID();
            },
            error:()=>{
                alert("Error Saving Product");
            }
        });
    }
    
    function Edit(){
        enableForm();
    }

    function updateProduct(){
        let prod=getData();
          if(!prod) return;
        $.ajax({
            url:prodApi,
            type:"PUT",
            contentType:"application/json",
            data:JSON.stringify(prod),
            success:()=>{
                alert("Product Updated!!");
                disableForm();
                loadProductID();
            }
        })
    }
    function deleteProduct(){
        let id = $("#ddlprodID").val();
        if(!confirm("Are you sure to delete?")) return;
        $.ajax({
            url: `${prodApi}?id=${id}`,
            type: "DELETE",
            success: () => {
                alert("Product Deleted");
                clearForm();
                loadProductID();
            },
            error: () => {
                alert("Error deleting employee");
            }
        });
    }
    </script>
