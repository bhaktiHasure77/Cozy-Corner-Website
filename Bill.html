    <h2 style="text-align: center;">Bill Details</h2>
    <table id="bill-table" border="0" cellpadding="7" cellspacing="20">
            
        <tbody id="bill-body">
        </tbody>
        <tfoot>
            <tr>
                <td colspan="1"><strong>Total Amount:</strong></td>

<script>
    $(document).ready(function () {

    const billData = JSON.parse(sessionStorage.getItem("billData"));
    const userName = sessionStorage.getItem("userName");

    if (!billData) {
        alert("No bill details found. Complete payment first.");
        return;
    }

    const billID = billData.BillID;
    const items = billData.Items;

    let html = "";
    let total = 0;

    $.ajax({
        url: "http://localhost:55801/api/Product",
        type: "GET",
        success: function (products) {

            // ✅ HEADER ONCE
            html += `
                <tr>
                    <th colspan="1">Bill ID</th>
                    <td colspan="3" style="text-align:right; padding-right:70px;">${billID}</td>
                </tr>
                <tr>
                    <th colspan="1">User Name</th>
                    <td colspan="3" style="text-align:right; padding-right:70px;">${userName}</td>
                </tr>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                </tr>
            `;

            items.forEach(item => {

                const product = products.find(p => p.ProdID === item.ProdID);
                if (!product) return;

                const qty = item.Qty;
                const price = item.Price;
                const subtotal = qty * price;

                total += subtotal;

                html += `
                    <tr>
                        <td>${product.ProdName}</td>
                        <td>₹${price}</td>
                        <td>${qty}</td>
                        <td>₹${subtotal}</td>
                    </tr>
                `;
            });

            $("#bill-body").html(html);
            $("#total-amount").text("₹" + total+".00");
        }
    });
});
</script>
